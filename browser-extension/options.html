<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>LuFei 插件设置</title>
    <link
      rel="stylesheet"
      href="styles.css"
    />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <header class="header">
          <div class="logo">
            <img
              src="icons/icon-192.png"
              alt=""
            />
          </div>
          <div>
            <h1 class="title">LuFei 自定义规则助手设置</h1>
            <p class="subtitle">Chrome 和 Edge 使用同一个插件目录</p>
          </div>
        </header>

        <div class="content">
          <label class="field">
            <span class="label">Lufei-ClashBoard 面板地址</span>
            <input
              id="server-url"
              class="input"
              placeholder="http://10.0.0.11:2048"
            />
            <span class="hint"
              >请填写 OpenWrt 和浏览器都能访问的局域网地址，不建议写 127.0.0.1。</span
            >
          </label>

          <div class="field grid">
            <label>
              <span class="label">默认策略</span>
              <select
                id="default-policy"
                class="select"
              >
                <option value="proxy">代理</option>
                <option value="direct">直连</option>
              </select>
            </label>
            <label>
              <span class="label">默认规则类型</span>
              <select
                id="default-kind"
                class="select"
              >
                <option value="domain_suffix">DOMAIN-SUFFIX</option>
                <option value="domain">DOMAIN</option>
                <option value="auto">自动</option>
                <option value="ip_cidr">IP-CIDR</option>
              </select>
            </label>
          </div>

          <label class="switch-line">
            <input
              id="prefer-root-domain"
              type="checkbox"
            />
            <span>添加域名时默认使用根域名，例如 www.example.com → example.com</span>
          </label>

          <div class="actions">
            <button
              id="save"
              type="button"
              class="button button-primary"
            >
              保存设置
            </button>
            <button
              id="test"
              type="button"
              class="button button-ghost"
            >
              测试连接
            </button>
          </div>

          <div
            id="status"
            class="status"
          ></div>
        </div>

        <footer class="footer">
          安装：Chrome 打开 <code>chrome://extensions/</code>，Edge 打开
          <code>edge://extensions/</code>，开启开发者模式后加载
          <code>browser-extension</code> 文件夹。
        </footer>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
