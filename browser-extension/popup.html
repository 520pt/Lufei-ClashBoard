<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>LuFei 自定义规则</title>
    <link
      rel="stylesheet"
      href="styles.css"
    />
  </head>
  <body>
    <main class="card popup">
      <header class="header">
        <div class="logo">
          <img
            src="icons/icon-192.png"
            alt=""
          />
        </div>
        <div>
          <h1 class="title">LuFei 自定义规则</h1>
          <p class="subtitle">当前网站一键加入代理或直连</p>
        </div>
      </header>

      <section class="content">
        <label class="field field-first">
          <span class="label">面板地址</span>
          <input
            id="server-url"
            class="input"
            placeholder="http://10.0.0.11:2048"
          />
        </label>

        <div class="actions compact-actions">
          <button
            id="save-settings"
            type="button"
            class="button button-ghost"
          >
            保存地址
          </button>
          <button
            id="test-connection"
            type="button"
            class="button button-ghost"
          >
            测试连接
          </button>
        </div>

        <div class="target-box">
          <div class="label">自动识别</div>
          <div
            id="target"
            class="target-line"
          >
            正在读取当前标签页...
          </div>
          <div
            id="kind"
            class="hint"
          >
            规则类型：自动识别中
          </div>
        </div>

        <label class="field">
          <span class="label">手动目标，可留空</span>
          <input
            id="manual-target"
            class="input"
            placeholder="例如 example.com 或 1.1.1.1"
          />
          <span class="hint">填写后会自动判断 DOMAIN-SUFFIX 或 IP-CIDR。</span>
        </label>

        <label class="switch-line">
          <input
            id="prefer-root-domain"
            type="checkbox"
          />
          <span>域名默认转成根域名，例如 www.example.com → example.com</span>
        </label>

        <div class="field">
          <span class="label">添加到哪个策略</span>
          <div
            class="segmented"
            role="tablist"
          >
            <button
              id="policy-proxy"
              type="button"
              data-policy="proxy"
            >
              代理
            </button>
            <button
              id="policy-direct"
              type="button"
              data-policy="direct"
            >
              直连
            </button>
          </div>
        </div>

        <button
          id="add"
          type="button"
          class="button button-primary"
        >
          添加到自定义规则
        </button>

        <div class="actions">
          <button
            id="open-panel"
            type="button"
            class="button button-ghost"
          >
            打开面板
          </button>
          <button
            id="refresh"
            type="button"
            class="button button-ghost"
          >
            重新识别
          </button>
        </div>

        <div
          id="status"
          class="status"
        ></div>
      </section>

      <footer class="footer">右键网页也可以快速加入自定义代理/直连。</footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
