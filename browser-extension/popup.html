<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>LuFei 自定义规则</title>
    <link
      rel="stylesheet"
      href="styles.css"
    />
  </head>
  <body>
    <main class="card popup">
      <header class="header">
        <div class="logo">
          <img
            src="icons/icon-192.png"
            alt=""
          />
        </div>
        <div>
          <h1 class="title">LuFei 自定义规则</h1>
          <p class="subtitle">当前网站一键加入代理或直连</p>
        </div>
      </header>

      <section class="content">
        <div class="field field-first">
          <div class="field-heading">
            <span class="label">面板地址</span>
            <button
              id="open-panel"
              type="button"
              class="inline-button"
            >
              打开面板
            </button>
          </div>
          <input
            id="server-url"
            class="input"
            placeholder="http://10.0.0.11:2048"
          />
        </div>

        <div class="actions compact-actions">
          <button
            id="save-settings"
            type="button"
            class="button button-ghost"
          >
            保存地址
          </button>
          <button
            id="test-connection"
            type="button"
            class="button button-ghost"
          >
            测试连接
          </button>
        </div>

        <div class="target-box">
          <div class="field-heading">
            <div class="label">目标地址</div>
            <button
              id="refresh"
              type="button"
              class="inline-button"
            >
              重新识别
            </button>
          </div>
          <textarea
            id="manual-target"
            class="input target-input"
            placeholder="可粘贴多行域名、IP 或 Clash 规则"
          ></textarea>
          <div
            id="kind"
            class="hint"
          >
            规则类型：自动识别中
          </div>
        </div>

        <label class="field">
          <span class="label">规则类型</span>
          <select
            id="rule-kind"
            class="select"
          >
            <option value="auto">自动识别</option>
            <option value="domain_suffix">DOMAIN-SUFFIX</option>
            <option value="domain">DOMAIN</option>
            <option value="ip_cidr">IP-CIDR</option>
            <option value="raw">原始规则</option>
          </select>
          <span class="hint">会按当前网页自动选中，也可以手动切换。</span>
        </label>

        <label class="switch-line">
          <input
            id="prefer-root-domain"
            type="checkbox"
          />
          <span>域名转根：www.example.com → example.com</span>
        </label>

        <div class="field">
          <span class="label">添加到哪个策略</span>
          <div
            class="segmented"
            role="tablist"
          >
            <button
              id="policy-proxy"
              type="button"
              data-policy="proxy"
            >
              代理
            </button>
            <button
              id="policy-direct"
              type="button"
              data-policy="direct"
            >
              直连
            </button>
          </div>
        </div>

        <div class="rule-state">
          <div class="field-heading">
            <span class="label">当前规则状态</span>
            <button
              id="refresh-status"
              type="button"
              class="inline-button"
            >
              刷新状态
            </button>
          </div>
          <div
            id="rule-status"
            class="rule-status"
          >
            正在读取...
          </div>
          <div class="actions compact-actions">
            <button
              id="switch-policy"
              type="button"
              class="button button-ghost"
            >
              切换策略
            </button>
            <button
              id="delete-rule"
              type="button"
              class="button button-ghost"
            >
              删除规则
            </button>
          </div>
        </div>

        <button
          id="add"
          type="button"
          class="button button-primary"
        >
          添加到自定义规则
        </button>

        <div
          id="status"
          class="status"
        ></div>
      </section>

      <footer class="footer">右键网页也可以快速加入自定义代理/直连。</footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
